services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: rafflehub
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  
  rafflehub.api:
    image: rafflehub.api
    build:
      context: .
      dockerfile: RaffleHub.Api/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - AppSettings__ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=rafflehub;Username=postgres;Password=password
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=rafflehub;Username=postgres;Password=password
    ports:
      - "8080:8080"
    depends_on:
      - postgres

volumes:
  postgres_data:
